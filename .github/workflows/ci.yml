name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowpos_test
          POSTGRES_USER: flowpos
          POSTGRES_PASSWORD: flowpos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowpos -d flowpos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run backend tests
        run: python -m pytest -q
      - name: Run Alembic smoke test
        run: python -m alembic upgrade head
      - name: Run PostgreSQL Alembic integration smoke test
        env:
          DATABASE_URL: postgresql+psycopg://flowpos:flowpos@127.0.0.1:5432/flowpos_test
          AUTO_CREATE_TABLES: "false"
        run: python -m alembic upgrade head
      - name: Audit Python dependencies
        run: python -m pip install pip-audit && pip-audit -r requirements.txt

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose config --quiet
      - name: Build API image
        run: docker build -t flowpos-api:test .
      - name: Build frontend image
        run: docker build -t flowpos-frontend:test ./frontend
